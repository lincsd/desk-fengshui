<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>专属诊断预约 · 支付引导</title>
  <style>
    :root {
      --bg: #fff7fb;
      --paper: rgba(255,255,255,.84);
      --ink: #4a3a46;
      --muted: #8e7283;
      --gold: #df9eb8;
      --line: #f1dbe4;
      --deep: #b97d9d;
      --soft: #fff0f6;
      --ok: #cf7b9e;
      --accent: #c88fb1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(223,158,184,.22), transparent 28%),
        radial-gradient(circle at right top, rgba(200,143,177,.12), transparent 24%),
        linear-gradient(180deg, #fff8fc 0%, #fffdfd 100%);
      color: var(--ink);
      line-height: 1.75;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 24px 18px 48px; }
    .hero, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      backdrop-filter: blur(14px);
      box-shadow: 0 18px 45px rgba(200,143,177,.12);
      margin-bottom: 18px;
    }
    .hero {
      background: linear-gradient(135deg, #c98aa7 0%, #dfa6bf 48%, #e9bfd2 100%);
      color: #fffafd;
    }
    h1, h2, h3 { margin: 0 0 12px; }
    .muted { color: var(--muted); }
    .hero .muted { color: rgba(255,255,255,.86); }
    .eyebrow {
      display: inline-flex;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.22);
      font-size: 12px;
      margin-bottom: 14px;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; }
    .step, .panel, .pay-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: #fff;
    }
    .step-num {
      width: 34px; height: 34px; line-height: 34px; text-align: center;
      border-radius: 50%; background: linear-gradient(135deg, #df9eb8, #c88fb1); color: #fff; font-weight: 700; margin-bottom: 10px;
    }
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px; padding: 8px 12px; margin-right: 8px; margin-top: 8px;
    }
    .pay-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; }
    .qr-box {
      aspect-ratio: 1 / 1;
      border-radius: 18px;
      background: var(--soft);
      border: 1px dashed #efcddd;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 18px; color: var(--muted);
      overflow: hidden;
    }
    .qr-box img { width: 100%; height: 100%; object-fit: contain; }
    .cta-row { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
    .btn {
      border: 1px solid var(--line); border-radius: 999px; padding: 12px 18px;
      background: #fff; color: var(--ink); text-decoration: none; cursor: pointer; font: inherit;
    }
    .btn.primary { background: linear-gradient(135deg, var(--deep), #d999b8); color: #fff; border-color: transparent; }
    .btn.success { background: linear-gradient(135deg, var(--ok), #e29db9); color: #fff; border-color: transparent; }
    .tips { margin: 0; padding-left: 20px; }
    .empty-pay-tip {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--soft);
      border: 1px dashed #efcddd;
      color: var(--muted);
    }
    .card h2::before {
      content: "✿";
      color: var(--accent);
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="eyebrow">🩰 专属诊断 · 预约支付</div>
      <h1>资料已提交，完成支付即可预约</h1>
      <p class="muted">选择下方支付方式完成付款，付款后点击"我已付款"进入你的专属诊断安排页。</p>
      <div>
        <span class="pill">👤 <span id="nicknameText">你的专属档案</span></span>
        <span class="pill">📋 <span id="tierText">标准诊断</span></span>
        <span class="pill">🗂️ 编号：<span id="fileText">待生成</span></span>
      </div>
    </section>

    <section class="card" id="paySection">
      <h2>选择支付方式</h2>
      <div class="pay-grid">
        <div class="pay-card" id="alipayCard">
          <h3 id="alipayLabel">支付宝</h3>
          <div class="qr-box" id="alipayQrBox">
            <div style="color:var(--muted);font-size:14px;text-align:center;">扫码完成支付<br><small style="opacity:.7;">付款时请备注你的昵称</small></div>
          </div>
          <div class="cta-row">
            <a class="btn primary" id="alipayBtn" href="#" target="_blank" rel="noopener">打开支付宝</a>
          </div>
        </div>
        <div class="pay-card" id="wechatCard">
          <h3 id="wechatLabel">微信支付</h3>
          <div class="qr-box" id="wechatQrBox">
            <div style="color:var(--muted);font-size:14px;text-align:center;">扫码完成支付<br><small style="opacity:.7;">付款时请备注你的昵称</small></div>
          </div>
          <div class="cta-row">
            <a class="btn primary" id="wechatBtn" href="#" target="_blank" rel="noopener">打开微信支付</a>
          </div>
        </div>
      </div>
      <div id="emptyPayTip" style="display:none;text-align:center;padding:24px;color:var(--muted);">暂未配置收款方式，请通过小红书联系我们完成预约。</div>
    </section>

    <section class="card">
      <div class="panel">
        <p style="margin:0;">💡 付款时请在备注里写上你的<strong>昵称</strong>，方便快速核对订单。</p>
        <p style="margin:8px 0 0;font-size:13px;color:var(--muted);">有疑问可联系：<span id="contactLine">小红书：打工人桌面玄学</span></p>
      </div>
      <div class="cta-row" style="margin-top:18px;">
        <a class="btn success" id="queueBtn" href="购买后须知.html" style="flex:1;text-align:center;font-size:17px;padding:18px 24px;font-weight:700;">✅ 我已付款，进入诊断安排</a>
      </div>
      <p style="margin-top:10px;font-size:13px;color:var(--muted);text-align:center;">付款完成后点击此按钮，查看专属诊断安排与交付流程。</p>
    </section>
  </div>

  <style>
    @keyframes pulse {
      0%,100% { transform:scale(1); box-shadow:0 12px 28px rgba(200,143,177,.25); }
      50% { transform:scale(1.04); box-shadow:0 20px 40px rgba(200,143,177,.5); }
    }
    .btn.success {
      background: linear-gradient(135deg,#5a9a6b,#4caa7a);
      color:#fff;
    }
    .btn.success:hover { opacity:.93; }
  </style>

  <script>
    const params = new URLSearchParams(window.location.search);
    const nickname = params.get('nickname') || '你';
    const tier = params.get('tier') || '标准诊断版';
    const fileName = params.get('file') || ('BOOK-' + Date.now());
    const queueUrl = params.get('queue_url') ||
      ('购买后须知.html?nickname=' + encodeURIComponent(nickname) +
       '&tier=' + encodeURIComponent(tier) +
       '&file=' + encodeURIComponent(fileName));

    document.getElementById('nicknameText').textContent = nickname;
    document.getElementById('tierText').textContent = tier;
    document.getElementById('fileText').textContent = fileName;
    document.getElementById('queueBtn').href = queueUrl;

    function checkImg(src) {
      return new Promise(resolve => {
        if (!src) { resolve(false); return; }
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = src;
      });
    }

    function updateVisibility() {
      const alipay = document.getElementById('alipayCard');
      const wechat = document.getElementById('wechatCard');
      const hidden = alipay.style.display === 'none' && wechat.style.display === 'none';
      document.getElementById('emptyPayTip').style.display = hidden ? 'block' : 'none';
    }

    async function initCard(prefix, cfg) {
      const card = document.getElementById(prefix + 'Card');
      const label = document.getElementById(prefix + 'Label');
      const qrBox = document.getElementById(prefix + 'QrBox');
      const btn = document.getElementById(prefix + 'Btn');
      const hasLink = Boolean(cfg && cfg.link);
      const hasImg = (cfg && cfg.qr_image) ? await checkImg(cfg.qr_image) : false;

      if (!hasLink && !hasImg) {
        card.style.display = 'none';
        return;
      }

      if (cfg.label) label.textContent = cfg.label;

      if (hasImg) {
        qrBox.innerHTML = '<img src="' + cfg.qr_image + '" alt="' +
          label.textContent + '收款码" style="width:100%;height:100%;object-fit:contain;border-radius:12px;">';
      }

      if (hasLink) {
        btn.href = cfg.link;
        btn.addEventListener('click', function() {
          setTimeout(function() {
            const done = document.getElementById('queueBtn');
            if (done) {
              done.style.animation = 'pulse 1.2s ease-in-out 3';
              done.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
          }, 3000);
        });
      } else {
        btn.style.display = 'none';
      }
    }

    fetch('payment_config.json')
      .then(function(r) { return r.ok ? r.json() : Promise.reject(); })
      .then(function(cfg) {
        if (cfg.contact_label || cfg.contact_value) {
          document.getElementById('contactLine').textContent =
            (cfg.contact_label || '小红书') + '：' + (cfg.contact_value || '打工人桌面玄学');
        }
        return Promise.all([
          initCard('alipay', cfg.alipay || {}),
          initCard('wechat', cfg.wechat || {})
        ]);
      })
      .then(updateVisibility)
      .catch(function() {
        document.getElementById('alipayCard').style.display = 'none';
        document.getElementById('wechatCard').style.display = 'none';
        updateVisibility();
      });
  </script>
</body>
</html>
